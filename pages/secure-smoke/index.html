<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Protected Hermes Report</title>
  <style>
    :root { color-scheme: dark; --bg:#090b12; --panel:rgba(255,255,255,.075); --panel2:rgba(255,255,255,.115); --line:rgba(255,255,255,.16); --text:#eef2ff; --muted:#a8b3cf; --accent:#22d3ee; --accent2:#8b5cf6; --bad:#fb7185; --good:#34d399; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:var(--text); background: radial-gradient(circle at 20% 10%, rgba(139,92,246,.34), transparent 28rem), radial-gradient(circle at 80% 0%, rgba(34,211,238,.22), transparent 26rem), var(--bg); }
    .unlock-wrap { min-height:100vh; display:grid; place-items:center; padding:28px; }
    .panel { width:min(760px, 100%); border:1px solid var(--line); border-radius:28px; background:linear-gradient(180deg, rgba(255,255,255,.105), var(--panel)); box-shadow:0 24px 80px rgba(0,0,0,.36); padding:clamp(24px, 5vw, 46px); }
    .eyebrow { display:inline-flex; border:1px solid var(--line); border-radius:999px; padding:.38rem .72rem; color:#dbeafe; background:rgba(255,255,255,.06); }
    h1 { font-size:clamp(2.1rem, 8vw, 4.4rem); line-height:.95; letter-spacing:-.06em; margin:18px 0 12px; }
    p { color:var(--muted); font-size:1.04rem; line-height:1.65; }
    form { display:grid; gap:14px; margin-top:24px; }
    label { color:#dbeafe; font-weight:650; }
    input { width:100%; border:1px solid var(--line); border-radius:16px; padding:1rem 1.05rem; color:var(--text); background:rgba(0,0,0,.24); font:inherit; outline:none; }
    input:focus { border-color:rgba(34,211,238,.65); box-shadow:0 0 0 4px rgba(34,211,238,.14); }
    button { cursor:pointer; border:0; border-radius:16px; padding:1rem 1.15rem; color:white; font:inherit; font-weight:750; background:linear-gradient(135deg, var(--accent2), var(--accent)); box-shadow:0 12px 36px rgba(34,211,238,.18); }
    button:disabled { cursor:wait; opacity:.72; }
    .status { min-height:1.5rem; color:var(--muted); }
    .status.bad { color:var(--bad); }
    .status.good { color:var(--good); }
    .report-frame { display:none; width:100%; height:100vh; border:0; background:white; }
    .note { font-size:.92rem; }
  </style>
</head>
<body>
  <div id="unlock" class="unlock-wrap">
    <main class="panel">
      <span class="eyebrow">Encrypted Hermes report</span>
      <h1>Protected report</h1>
      <p>This report is encrypted. Enter the passphrase shared separately to decrypt it locally in this browser.</p>
      <form id="form">
        <label for="passphrase">Passphrase</label>
        <input id="passphrase" name="passphrase" type="password" autocomplete="current-password" autofocus required>
        <button id="button" type="submit">Decrypt report</button>
        <div id="status" class="status"></div>
      </form>
      <p class="note">Decryption uses WebCrypto PBKDF2 + AES-GCM. Nothing is sent to a server.</p>
    </main>
  </div>
  <iframe id="frame" class="report-frame" sandbox="allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>
  <script>
    const $ = (id) => document.getElementById(id);
    const form = $('form');
    const button = $('button');
    const statusEl = $('status');
    const passphraseEl = $('passphrase');
    const unlock = $('unlock');
    const frame = $('frame');

    function b64ToBytes(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function deriveKey(passphrase, salt, iterations) {
      const material = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(passphrase), 'PBKDF2', false, ['deriveKey']
      );
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', hash: 'SHA-256', salt, iterations },
        material,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
    }

    async function decryptReport(passphrase) {
      const payload = await fetch('payload.json', { cache: 'no-store' }).then(r => {
        if (!r.ok) throw new Error('Could not load encrypted payload.');
        return r.json();
      });
      if (payload.v !== 1 || payload.cipher !== 'AES-256-GCM') throw new Error('Unsupported encrypted payload.');
      const salt = b64ToBytes(payload.salt);
      const iv = b64ToBytes(payload.iv);
      const ciphertext = b64ToBytes(payload.ciphertext);
      const key = await deriveKey(passphrase, salt, payload.iterations);
      const plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
      return new TextDecoder().decode(plaintext);
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      button.disabled = true;
      statusEl.className = 'status';
      statusEl.textContent = 'Decrypting…';
      try {
        const html = await decryptReport(passphraseEl.value);
        statusEl.className = 'status good';
        statusEl.textContent = 'Decrypted.';
        frame.srcdoc = html;
        frame.style.display = 'block';
        unlock.style.display = 'none';
        document.title = 'Decrypted Hermes Report';
      } catch (error) {
        statusEl.className = 'status bad';
        statusEl.textContent = 'Could not decrypt. Check the passphrase.';
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
