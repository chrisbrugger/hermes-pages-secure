<!doctype html>
<html lang="en" data-theme="ledger">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes Secure Reports</title>
  <link rel="stylesheet" href="assets/shell.css?v=20260702-persist-ui">
  <script src="assets/decrypt.js?v=20260702-persist-ui" defer></script>
</head>
<body data-secure-page data-mode="index" data-payload="index_payload.json">
  <div id="unlock" class="unlock-wrap">
    <main class="panel">
      <span class="eyebrow">Encrypted report index</span>
      <h1>Hermes Secure Reports</h1>
      <p>This overview is encrypted. Enter your master passphrase to view report headlines and navigation.</p>
      <form id="form">
        <label for="passphrase">Master passphrase</label>
        <input id="passphrase" name="passphrase" type="password" autocomplete="current-password" autofocus required>
        <label for="theme">Theme</label>
        <select id="theme" name="theme">
          <option value="ledger">Ledger</option>
          <option value="redline">Redline</option>
          <option value="obsidian">Obsidian</option>
          <option value="ember">Ember</option>
        </select>
        <button id="button" type="submit">Unlock overview</button>
        <div id="status" class="status"></div>
      </form>
      <p class="note">The public page contains no report headlines until this index is decrypted locally.</p>
    </main>
  </div>
  <iframe id="frame" class="report-frame" sandbox="allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation"></iframe>
</body>
</html>
