<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes Secure Reports</title>
  <style>
    :root { color-scheme: dark; --bg:#090b12; --panel:rgba(255,255,255,.075); --line:rgba(255,255,255,.16); --text:#eef2ff; --muted:#a8b3cf; --accent:#22d3ee; --accent2:#8b5cf6; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:var(--text); background: radial-gradient(circle at 20% 10%, rgba(139,92,246,.34), transparent 28rem), radial-gradient(circle at 80% 0%, rgba(34,211,238,.22), transparent 26rem), var(--bg); display:grid; place-items:center; padding:28px; }
    main { width:min(760px, 100%); border:1px solid var(--line); border-radius:28px; background:linear-gradient(180deg, rgba(255,255,255,.105), var(--panel)); box-shadow:0 24px 80px rgba(0,0,0,.36); padding:clamp(24px, 5vw, 46px); }
    .eyebrow { display:inline-flex; border:1px solid var(--line); border-radius:999px; padding:.38rem .72rem; color:#dbeafe; background:rgba(255,255,255,.06); }
    h1 { font-size:clamp(2.25rem, 8vw, 4.7rem); line-height:.95; letter-spacing:-.06em; margin:18px 0 12px; }
    p { color:var(--muted); font-size:1.08rem; line-height:1.65; }
    code { color:#bae6fd; }
  </style>
</head>
<body>
  <main>
    <span class="eyebrow">Encrypted static reports</span>
    <h1>Hermes Secure Reports</h1>
    <p>This public site does not list report contents. Open a direct report link and enter the passphrase shared with you separately.</p>
    <p>Reports are encrypted before deployment and decrypted locally in your browser.</p>
  </main>
</body>
</html>
